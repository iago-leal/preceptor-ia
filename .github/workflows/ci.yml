name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-e-testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Instalar dependências
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Formato (ruff format)
        run: uv run ruff format --check .
      - name: Testes (pytest)
        run: uv run pytest -q
